body:
  text: 按語八十五條傷寒邪結陽明發為狂熱猶是宿食宜吐之非若燥糞便硬可下而愈也雄按凡下之不通而死者多此類也傷寒邪熱甚則正餒不可誤認為虛雄按繆仲淳治姚平之案可證傷寒初愈臟腑猶多熱毒時師不察驟投參耆朮附溫補其遺患可勝言哉雄按寓意草傷寒善後法學者最宜詳玩凡診病淺見者反若深慮多令病家無所適從雄按此評仲淳治虞吉卿案或疑其虛而用桂附也今則此輩尤多誤人愈廣不知療病但欲補虛舉國若狂誰為喚醒龔子才治傷寒譫渴無汗用大梨一枚生薑一小塊同搗取汁入童便一碗重湯煮熟服制方甚佳愈於甘露且免地黃之膩雄按余以梨汁為天生甘露飲而昔賢已先得我心若有汗者生薑宜避傷寒發散過投氣微欲絶雖有實證亦宜獨參猛進貧者以重劑杞地少入乾薑雄按熱熾而氣液欲脫者乾薑亦忌宜易甘草實邪宜下人便稀識可為浩嘆雄按學識淺者皆為立齊景嶽諸書所囿也傷寒狂躁脈至洪大無倫按之如絲者以全料六味減苓澤加麥冬杞子用大砂罐濃煎與之必數杯而後酣寢汗出以愈古時此法未聞惟仗人參之力取效本陰竭之證乃峻補其陽使生陰而愈故用參每多至數斤設在今時非猗頓之家不可為矣雄按陰竭之證今時尤多人參之價近日更昂惟西洋人參性涼生液最為可用而時師輒以桂附乾薑治陰虛狂躁益非魏君所能逆料矣內真寒而外假熱諸家嘗論之矣至內真熱而外假寒論及者罕矣景嶽治王生陰虛傷寒燥渴用涼水是矣而又雜與桂附各數兩治法未能無疵至舌苔成殼脫落恐桂附使之然也雄按今人明知其陰虛而放肆用桂附者皆效景嶽之尤也喻氏治傷寒以救陰為主一語為治傳經證之祕旨躁脈多凶疫病熱鬱之極脈亦躁也疫證脈雙伏或單伏而四肢厥冷或爪甲青紫欲戰汗也宜熟記房勞外感即謂陰證而與熱藥殺人多矣虛人肝腎之氣上浮宛如痰在膈間須投峻劑養陰俾龍雷之火下歸元海雄按葉香岩云龍雷之起總因陽亢宜滋補真陰今人反用熱藥悖矣詳見景嶽發揮醫者不可不讀也凡病尸厥呼之不應脈伏者死脈反大者死凡卒暴病如中風中氣中寒暴厥俱不得移動喧鬧以斷其氣內經明言氣復返則生若不諳而擾亂其氣不得復以致夭枉者多矣蓋暴病多火擾之則正氣散而死也病家醫士皆宜知此余常見父母有肝病者其子女亦多有之而稟乎母氣者尤多木熱則流脂斷無肝火盛而無痰者雄按此語未經人道余每以雪羹龍薈治痰殊與魏君暗合張子和治新寨馬叟之證本因驚而得尤不能無郁也蓋驚入心心受之則為癲癇今心不受而反傳之肝則為瘛瘲亦母救其子之義也肝病則乘其所勝於是生風生痰怪證莫測治以上湧下泄乃發而兼奪之理並行不悖最合治法雄按馬無膽而善驚故驚字從馬似與恐懼怵惕之從心者異焉古人雖曰驚入心然非膽薄斷不患驚凡病驚者其色必青肝膽相連殆不必心不受而後始傳入也肝火亦作頭暈不盡屬之氣虛也經云諸風掉眩皆屬於肝肝之脈上絡巔頂余嘗以一氣湯加左金治此甚效補中益氣湯為東垣治內傷外感之第一方後人讀其書者鮮不奉為金科玉律然不知近代病人類多真陰不足上盛下虛者十居九焉即遇內傷外感之證投之輒增劇非此方之謬要知時代稟賦各殊耳陸麗京曰陰虛人誤服補中益氣往往暴脫司命者其審諸雄按東垣此方謂氣虛則下陷升其清陽即是益氣然命名缺妥設當時立此培中舉陷之法名曰補中升氣湯則後人顧名思義庶知其為升劑也原以升藥舉陷乃既曰補中復云益氣後人遂以為參術得升柴如黃耆得防風而功愈大既能補脾胃之不足又可益元氣之健行而忘其為治內傷兼外感之方凡屬虛人皆宜服餌再經薛氏之表章每與腎氣丸相輔而行幸張景嶽一靈未泯雖好溫補獨謂此方未可浪用奈以盧不遠之賢亦袒薛氏甚矣積重之難返也徐洄溪云東垣之方一概以升提中氣為主學者不可誤用然此方之升柴尚有參耆朮草之駕馭若升麻葛根湯柴葛解肌湯等方純是升提之品苟不察其人之陰分如何而一概視為感證之主方貽禍尚何言哉葉香岩柴胡劫肝陰葛根竭胃汁之說洵見道之言也凡素患虛損人忽有外感宜細審之雄按此處最易誤人拙案仁術志內曾論及之傷寒及感證日久津液既枯不能行汗得大劑三才一氣湯一服乃蒸變為汗而愈矣若曾多風藥及香燥者藥入必大作脹一二時許然後來蘇後賢以此為內托之奇余謂仍是仲景啜粥法耳後人安能越古人之範圍哉傷風一證殊非小恙有寒燠不時衣被失節而成者此必鼻塞聲重咳嗽多痰在元氣平和之人即弗藥自愈若在腎水素虧肝火自旺者不過因一時風寒所束遂作乾咳喉痛此外邪本輕內傷實重醫者不察輒與表散致鼓其風木之火上炎反今發熱頭痛繼又寒熱往來益與清解不數劑而肝腎與肺三臟已傷損無遺遠者周年近者百日溘然逝矣而世俗談者咸以傷風不醒便成勞為言噫彼勞者豈真由傷風而成耶愚哉言也當易之曰傷風誤表必成勞耳雄按陰虛誤表固然若外邪未清投補太早其弊同也不居集論之詳矣故徐洄溪有傷風難治之論也瘧痢後飲食不運多屬氣虛然每有痢以下多而亡陰瘧以汗多而耗液飲食難運多由相火盛真氣衰非大劑二冬二地投之多見纏綿不已也寓意草謂感後宜甘寒清熱說得極透徹最中肯綮雄按世人治此但知六君以補脾桂附以益火殺人最夥可為寒心肺氣敗者多見兩足腫潰小水全無二證雄按粗工但知為濕邪阻塞也陰虛證初投桂附有小效久服則陰竭而死余目擊數十矣雄按此真閲歷見道之言又徐洄溪曰大熱大燥之藥殺人最烈蓋熱藥有毒其性急暴一入臟腑則血湧氣升若其人之陰氣本虛或當天時酷暑或其人傷暑傷熱一投熱劑兩火相爭目赤便悶舌燥齒乾口渴心煩肌裂神躁種種惡候一時俱發醫者及病傢俱不察或云更宜引火歸元或云此是陰證當加重劑熱藥而佐以大補之品其人七竅流血呼號宛轉狀如服毒而死病家全不以為咎醫者亦洋洋自得以為病勢當然總之愚人喜服熱補雖死不悔我目中所見不一垂涕泣而道之而醫者與病家無一能聽從者豈非所謂命哉夫大寒之藥亦能殺人其勢必緩猶為可救不若大熱之藥斷斷不可救也愚謂此非激論的是名言今年春間韓貢甫因患便血誤服熱補變證蜂起業治木矣其婦翁陳春湖囑延余診已為治愈逮季夏其弟正甫患時瘧越醫王某連進溫燥藥而劇始邀余視之乃府實證下之而瘥既而貢甫令壺患感凜寒身熱眩渴善嘔余曰暑也宜從清解彼不之信仍招越醫王某治之連服蒼朮厚朴薑椒之劑嘔渴愈甚泛事妄行四肢不溫汗多不解再邀余診脈漸伏曰此熱深厥深也溫燥熱補切勿再投彼仍不信另招張某黃某會診僉謂陰暑當舍時從證徑用姜附六君加萸桂沉香等藥服之肢愈冷藥愈重八劑後血脫如崩而逝即以春間所治之棺殮焉豈非數邪此病家不知悔悟之一證也繼有許蘭嶼室患左季脅刺痛黃某目擊韓證之死亦不愧悔初診即用桂附愈服愈痛痛劇則白帶如注漸至舌赤形消彼猶曰溫補之藥力未到方中桂附日增甚至痛無寧晷始逆余診授以壯水和肝養營舒絡之方而愈往者不可追來者猶可諫故附贅之熱補藥謂之劫劑初劫之而愈後反致重世不知此以為治驗古今受其害者可勝數哉嘔吐證良由肝火上逆者極多張景嶽偏於溫補以為多屬胃寒其誤人諒不少矣完穀不化有邪火不殺穀火性迫速愈甚而愈迫者發熱之時脈雖豁然空大未可便斷為虛寒也痢疾補澀太早每成休息張景嶽平生臨證遺憾多矣觀其治食停少腹一案夫麵食由胃入腸已至小腹之角豈能作痛如是而又如拳如卵耶必其人素有疝病偶因麵食之濕熱發之或兼當日之房勞遂乃決如是故推蕩之亦不應得木香火酒一派辛熱香竄而痛止耳至謂食由小腹下右角而後出廣腸謂自古無言及者更堪捧腹經謂大小腸皆盤屈十六曲則左旋右折可知豈如筒如袋而直下乎嘻傷寒論病人素有痞積及病傳入三陰則死謂之臟結蓋新邪與舊邪合併也苦楝根取新白皮一握切焙入麝少許水二碗煎至一碗空心飲之殺消渴之蟲屢驗孫文垣治吳肖峰室善後不用滋水生木弦脈安能退哉李士材治顧宗伯心腎兩虧用八味十全與後醫之元參知母其失正均惟集靈膏一方真聖劑也雄按集靈膏見廣筆記方用人參枸杞牛膝二冬二地或加仙靈脾凡治小兒不論諸證宜先揣虛里穴若跳動甚者不可攻伐以其先天不足故也幼科能遵吾言造福無涯矣此千古未泄之祕也珍之貴之雄按大人亦然小兒則脈候難憑揣此尤為可據勞損病已不可為服藥得法往往有驟效乃虛陽暫伏也數服後證皆仍舊矣臨證者不可不知肺熱之人雖産婦誤服人參多致痰飲膠結胸中為飽為悶為咳嗽不食等證喻氏治郭臺尹之證多由醉飽入房大傷真陰絶其帶脈水虧木燥乘其所不勝之脾成脹耳魚鹽之論恐未必然又治顧鳴仲之證似屬肝腎二經與膀胱無干涉乃舍肝而強入膀胱便覺支離滿紙火盛而鬱者多畏風畏寒雄按人但知傷風畏風傷寒畏寒能識此者鮮矣梅核證由鬱怒憂思七情致傷而成無非木燥火炎之候古人多用香燥之劑豈當時體質厚耶余治肝腎虧損氣喘吸促之證必重投熟地人參無力之家不能服參者以棗仁杞子各一兩代之亦應如桴鼓雄按枸杞一味專治短氣其味純甘能補精神氣血津液諸不足也繆氏謂陽明熱邪傳裡故身涼發噦是金針也凡損證脈見右寸厥厥然如豆按之梗指其病不起以肺金敗也楊介都梁丸治頭痛惟陽明風熱宜之余不可服雄按古方治病皆當察其藥所主之證而用之不獨都梁丸爾也學者須知隅反醫學鉤元有目病不宜服六味辨謂澤瀉茯苓山茱萸不宜於目余謂凡肝腎虛皆不宜此三味不惟目也雄按用藥治病須知量體裁衣執死方以治活病有利必有弊也景嶽見燕都女子喉竅緊澀而不能以左歸合生脈救之乃誤用辛溫解散既而知其肺絶又效粗工避謗不敢下手按丹溪云咽喉腫痛有陰虛陽氣飛越痰結在上脈必浮大重取必澀去死為近宜人參一味濃煎細細呷之如作實證治禍如反掌觀此丹溪之學何可薄哉傳忠録之言九原有知宜滋愧矣戴人治一將軍病心痛張曰此非心痛也乃胃脘當心而痛也余謂此二語真為此證點睛然余更有一轉語曰非胃脘痛也乃肝木上乘於胃也世人多用四磨五香六郁逍遙等方新病亦效久服則殺人又用玉桂亦效以木得桂而枯也屢發屢服則肝血燥竭少壯者多成勞病衰弱者多發厥而死不可不知余自創一方名一貫煎用北沙參麥冬地黃當歸枸杞川楝六味出入加減投之應如桴鼓口苦燥者加酒連尤捷可統治脅痛吞酸吐酸疝瘕一切肝病雄按胸脅痛有因於痰飲者滋膩亦不可用也香附鬱金為治肝要藥然用之氣病則可用之血病則與干將莫邪無異也慎之二地膩膈之說不知始自何人致令數百年來人皆畏之如虎俾舉世陰虛火盛之病至死而不敢一嘗逮已瀕危始進三數錢許已無及矣哀哉雄按此為陰虛火盛者說若氣虛濕盛氣滯痰凝者誤用則膩膈矣凡脅腹結塊隱現不常痛隨止作者全屬肝傷木反剋土非實氣也時師金以香燥辛熱治之促人年壽余治此多人悉以一氣湯加川楝黏仁蔞仁等不過三五劑其病如失若立齊多用加味逍遙散鼓峰東莊輩多用滋水生肝飲皆不及余法之善也逍遙散亦當灸用緣柴胡白朮皆非陰虛火盛者所宜也景嶽生平於薛氏諸書似未寓目至脅痛由於肝脈為病至死不知良可哀也如案中載治其姻家脅肋大痛一證全屬廖論幸得一灸而愈此與厄逆病諸治不效灸虛里立瘥正同也凡泄瀉火證極多帶濁之病多由肝火熾盛上蒸胃而乘肺肺主氣氣弱不能散布為津液反因火性迫速而下輸膀胱之州都本從氣化又肝主疏泄反稟其令而行遂至淫淫不絶使但屬胃家濕熱無肝火為難則上為痰而下為瀉耳古今醫案於帶濁二門獨罕存者亦以未達其旨而施治無驗也至單由濕熱而成一味涼燥雖藥肆工人亦能辨此雄按此誠確鑿之論胞痹欲名尿梗病香燥之藥誤投殺人世罕知也觀張石頑治閔少江證誤服丹皮白朮即脹痛不禁可見景嶽治朱翰林太夫人證乃陰虛陽越之風祕亦類中之輕者一跌而病良有已也未可歸功薑附不知陰證二字何以插入其生平見解大可知矣馮氏治崔姓風祕證亦陰虛陽越之病甚則為類中其治法亦大醇而小疵耳至云陰伏於內逼陽於外亦與景嶽治朱太夫人謂為陰證同一模糊蓋緣風祕一條人多不講也傷寒瘧痢之後患悶結者皆由攻下表散失宜所致究其由則皆血燥為病至若風祕一證其病本由燥火生風醫者昧於風字動用風藥死者已矣存者幸鑑之雄按凡內風為病不論何證皆忌風藥醫不知風有內外之殊以致動手便錯觀醫通載婦科鄭青山憤喜交集因而發狂一事業醫者亦可憐哉有志之士慎勿為此彼云不可不知醫者非聖人之言也凡心腹痛而唇紅吐白沫者或好啖者多屬蟲證陰虛火盛之人初服桂附薑萸等燥熱剛藥始則甚得其力所謂劫治也昧不知止久而決裂莫可挽回余目擊其敝者數十人矣二便俱從前陰出者宜集靈膏重用人參以補肺而潤腸蓋肺與大腸相表裡而主氣又肺者相傅之官治節出焉肺得養斯大腸之燥可清又得枸杞二冬以滋其血槁然後故道可復而清濁自分矣近時專科及庸手治産後一以燥熱溫補為事殺人如麻雄按非獨産後也如嘔吐泄瀉瘧痢哮喘痿痹腫脹痰飲腹痛疝瘕諸證粗工無不悉指為寒而不知其屬熱者多也馮楚瞻之媳胎前多服八味丸所以生子百日內即患癘證産後惡露不下有二一則瘀滯宜行一則血虛宜補肝火病其狀如瘧蓋膽為肝府肝病則膽亦病矣産後病多屬陰虛治必養營若氣血兼補雜以薑附剛劑非耽延時日即貽病者後患臨證者審之火極似水乃物極必反之候凡患此為燥熱溫補所殺者多矣哀哉立齊謂産後陰氣大虛正喜亡陽與陰齊等云可勿藥而愈此正薛氏生平不能峻用養陰之缺處也馮楚瞻治一産後頭汗證拘泥薛法而不與藥致病家屬之庸手而敗是守而未化之過也雄按陰虛不敢救陰亦泥於産後宜溫之俗說乃云正喜亡陽是何言耶非僅缺處直是謬論無怪乎徐洄溪以薛氏為庸醫之首也患痘腰痛曾有房事者最稱難治余謂以大劑左歸飲與之必有可挽醫學無真知而參末議最能誤人智者慎之麻疹之發本諸肺胃治之但宜松透一切風燥寒熱之劑不可入也余常遇表散過甚綿延不已者一以生地杞子地骨麥冬婁仁沙參等味三四劑必嗽止熱退而安若呂東莊之用桂附因其苦寒過劑故處方如是非可一切試之也病危之家親賓滿座議論紛紜徒亂人意不可不知余嘗診一兒見其左掌拳曲詢其由乃小時患驚搐為母抱持太急病愈手遂不能伸舒若初起即以大劑滋肝腎真陰與之必能伸舒如故惜世無知者腫證多濕熱為患雖云脾虛必審其小便長短清濁及大便溏燥濃淡以施治法若概云脾虛參術蠻補必致綿延不已肝脈挾胃貫膈又曰是所生病者為胸滿故胸之癰疽本由於肝然此證最難別白即內經所謂內有裹大膿血之證也吾鄉一名醫自患此同道診之不知為癰也雜進參附丁桂之劑久之吐出臭膿乃省已無及矣寸強尺弱之脈多屬陰虛火炎之候誤服八味丸每致貽患不拘內外病凡陰虛者服參耆諸氣分藥非惟無益而反害者諸病火盛而汗出者若驟斂之反增他證凡肝鬱病誤用熱藥皆貽大患肝木為龍龍之變化莫測其於病也亦然明者遇內傷證但求得其本則其標可按籍而稽矣此天地古今未泄之祕內經微露一言曰肝為萬病之賊六字而止似聖人亦不欲竟其端委殆以生殺之柄不可操之人耳余臨證數十年乃始獲之實千慮之一得也世之君子其毋忽諸雄按肺主一身之表肝主一身之裡五氣之感皆從肺入七情之病必由肝起此余夙論如此魏氏長於內傷斯言先獲我心蓋龍性難馴變化莫測獨窺經旨理自不誣附方續名醫類案簡妙愈病之方附採於下疸瘧青蔗汁任飲之並治蛔動痞痛久瘧不愈以棗一枚安病人口上咒曰我從東方來路逢一池水水內一尊龍九頭十八尾問他吃甚麼專吃瘧疾鬼太上老君急急如律令敕咒三遍將棗納入口中令嚼食之即瘥雄按此即上古祝由之意必邪已漸衰始能有效又何首烏五錢陳皮二錢青皮三錢酒一碗河水一碗煎至一碗溫服即愈又石首魚恣啖可愈雄按邪未衰者忌之血痢久不瘳烏梅肉胡黃連伏龍肝等分為末茶調下五色痢久不瘳大熟栝蔞一個煅存性出火毒為末作一服溫酒下熱毒下痢膿血痛不可忍水浸甜瓜恣啖之噤口痢牛乳頻灌之傳尸勞宜先服玉樞丹繼以蘇合丸其蟲即下吐血用水澄蚌粉研細入硃砂少許米飲調下二錢衄血用赤金打一戒指帶左手無名指上如發病將戒指捏緊箍住則血止矣或以蒜杵爛貼湧泉穴又真麻油紙捻紝鼻中打嚏即止或以人乳擠入即止又用燈盞數枚沸湯中煮熱安頂上冷即易之牙衄用苦竹茹四兩醋煮含漱吐之舌衄赤小豆一升杵碎水三碗和搗取汁每服一盞外以槐花末糝之筋骨疼如夾板狀痛不可忍者以驢騾修下蹄甲砂鍋內炒為炭研細末酒或白湯下雄按此方並治臁瘡久不愈麻油調敷之瘡濕者糝之醋哮用粉甘草二兩去皮研開以豬膽六七枚取汁浸三日炙乾為末蜜丸清茶下三四十丸怒後厄忒用鐵二斤燒紅淬水飲之痰喘久不痊五味子白礬等分為末熟豬肺蘸末細嚼白湯下偏頭風南星半夏白芷等分為末生薑蔥白杵爛和捏為餅貼太陽上一夕良已頭疼如劈目中溜火酒製大黃為末茶調服三錢偏頭風萆麻仁同乳香食鹽搗貼頭風畏冷久不愈荍麥面二升水調作二餅更互合頭上微汗即愈拳毛倒睫木鱉子一個去殼為末棉裹塞鼻中左目塞右右目塞左一二夜即痊爛弦風眼黃連淡竹葉各一兩柏樹皮乾者一兩如半濕者用二兩㕮咀水二斗煎五合稍冷用滴目眥及洗爛處日三四鼻瘜瓜蒂細辛等分細研以棉包豆許塞之化水而消或以瓜蒂研末羊脂和敷亦妙胃火鼻赤每晨以鹽擦齒噙水漱口旋吐掌中掬以洗鼻月餘而愈鼻流臭黃水腦痛如蟲齧用絲瓜藤近根三五尺許燒存性研細酒調下食物從鼻中縮入腦中介介痛不得出以羊脂如指頭大內鼻中吸入須臾脂消物隨出齒腫痛用黑豆以酒煮汁漱之立愈蛀牙疼川椒為末巴豆一粒同研成膏飯為丸如緑豆大以棉裹安蛀孔內立效脫齘以酒飲之令醉取皂角末吹入鼻中嚏透即止咽喉壅塞吹皂角末於鼻中取嚏外以李樹近根磨水塗喉外急喉痹口開不得者巴豆仁拍碎棉裹隨左右塞鼻中即吐出惡物喉寬即拔去之後鼻中生小瘡亦無害喉痛危困令人以手用力揪其頂心發即愈無發者用力撮其頂心皮心腹久痛梔子炭一兩生薑五片煎服鶴膝風乳香沒藥各一錢五分地骨皮三錢無名異五錢麝香一分各為末車前草搗汁入老酒少許和敷患處腳氣袋盛赤小豆朝夕踐踏展轉之漸愈又樟腦排兩股間以腳繃系定腳氣上攻及一切腫毒流注以甘遂研細末水調敷患處另濃煎甘草湯服之二物相反須二人各處買並不可安放一所用之立效諸疝以灰布門檻上脫褲坐之陰囊著灰即有一印左患灸左印右患灸右印須避四眼五月五日灸尤效風顛神方烏犀角四兩銼末每用一兩清水十碗砂鍋內煎至一碗濾淨再加水十碗熬至二酒杯另以淡竹葉四兩水六碗煎二碗去渣加犀角汁同服盡四劑即愈稻芒著喉鵝涎灌之誤吞銅錢麵筋置新瓦煅作炭研細開水調溫服未下咽者即從口出已下咽者從大便出神效未下咽者以生大蒜塞鼻中亦能出尤簡便誤吞鐵針乳香荔枝朴硝為末豬脂入鹽和之吞服防蠱毒須袖中常帶當歸遇飲食訖即咀嚼少許若有毒即時嘔吐又法食不輟醋蠱不入肚解蠱毒敗鼓皮燒灰服方寸匕須臾自吐又生甘草五錢煎汁半溫飲之入咽即吐恐未盡再一服又馬兜鈴藤十兩水一斗酒二升煮三升分三服又升麻鬱金煎服不吐則下毒自去矣又玉樞丹井華水調服陰毛生蝨生銀杏杵爛敷之煙火熏死蘆蔔搗汁灌之中砒毒白扁豆生研細新汲水下二三錢河豚毒麻油灌之丹石毒菾菜頻煮食之狐媚以桐油塗陰上即絶跡男女皆可用此法邪祟玉樞丹頻服之並以燒煙於臥室即愈鬼交鹿角末三指一撮清酒和服飛尸玉樞丹以忍冬藤煎濃湯灌之走馬牙疳蠶蛻紙燒存性入麝少許蜜和敷加白礬尤妙小兒好吃粽成積脹痛白酒麴同黃連末為丸服或以熬酒調曲末服亦可又吃鴨蛋不消用砂仁末錢許棗湯下小兒口噤不開豬乳飲之立效若月內胎驚同硃砂牛乳少許抹口中甚良小兒驚風導赤散煎湯送瀉青丸大妙小兒噤口痢乾山藥半生用半炒黃色研細末米飲下腫毒初起用雞子一枚以銀簪插一孔用透明雄黃三錢研極細末入之仍以簪攪勻封孔放飯上蒸熟食之日三枚神效又方麥粉即小粉乃洗麩造麵筋澄下者也不拘多少陳醋和之熬成膏貼之即愈陳久者愈佳又方糯米飯乘熱入鹽並蔥管杵極爛如膏貼之發背玉樞丹內服外塗即可得瘳翻花瘡藜蘆末生豬脂調塗腰疽未破者新殺牡豬肝切如瘡大貼之以布纏定一周時即愈肝色變黑犬亦不食雄按一切癰疽似亦可用痔瘡蘆蔔煎湯頻洗佳又玉樞丹服之良亦治便毒又先以木鱉子煎湯熏洗後以蔥涎蜂蜜對調勻敷之立效陰囊潰爛紫蘇末敷之杉木灰亦可並用便毒棉地榆四兩白酒三碗煎一碗服即愈臁瘡先以淡齏水洗淨浥干次用駐車丸研極細加乳香少許干糝之又爛搗馬齒莧敷之並療多年惡瘡百方不效者又松香一兩輕粉三錢乳香五錢細茶五錢共打成膏先以蔥白花椒湯熏洗淨用布攤膏厚貼用絹縛定黃水流盡腐退生肌耳疔夏枯草甘菊貝母忍冬地丁大劑飲之髭疔牙關緊急者用患者耳垢齒垢並刮手足指甲屑和勻如豆大放茶匙內鐙火上炙少頃取作丸將銀針挑開疔頭抹入外以棉紙一層津濕覆之立愈兼治紅絲疔諸疔用陳年露天鐵鏽碾如飛面以金簪腳挑破疔頭納入仍將皮蓋好少頃黑水流出中有白絲如細線慢慢抽盡此疔根也抽盡立愈或用甘菊花並根葉搗汁以酒下之諸癬先以溫漿水洗之舊帛拭乾用蘆薈一兩炙甘草半兩研細和勻敷之凍瘡黃柏燒存性研雞蛋清調塗破者糝之一切惡瘡陳米飯緊作團或用肥皂亦可火煅存性加膩粉研細麻油調敷坐板瘡松香五錢雄黃一錢研細和勻以棉紙包捻成條臘月豬油浸透點火燒著取滴下油搽之立效如濕癢者加蒼朮末三錢同包下疳生槐蕊開水送三錢日三服又小薊地骨皮每五兩煎濃湯洗淨鮮者更妙久浸即瘥再以黃芩黃柏宮粉珍珠冰片研末敷之梅瘡乾荷葉濃煎代茶飲甚效又松香鉛粉研末麻油調塗打撲損傷腫痛生薑自然汁米醋牛皮膠同熬溶入馬勃末不拘多少攪勻如膏以薄紙攤貼患處即效杖不知痛三七無名異地龍共搗白蠟為丸酒服或以白蠟一兩䗪蟲一枚酒服亦妙杖丹水蛭為末和朴硝少許水調敷之被笞身無完膚者骨碎補爛研取汁酒調或煎服渣敷患處箭鏃炮子入肉干莧菜研末沙糖調塗金瘡黃牛膽煅存性研細敷之湯火傷松樹皮自剝落而薄者更良陰乾研細入輕粉少許生油調敷如敷不住紗絹縛之或用地榆末糝又夏枯草研細麻油調厚敷之竹木刺烏羊屎搗爛水調厚罨之即出蜂螫蚯蚓屎塗之犬咬梔子研末蘆蔔汁調敷猘犬咬者服玉真散玉真散即防風天南星等分研末並治金刃傷打撲跌墜及破傷風皆效疔疽發背瘰癧惡瘡及毒蛇猘犬傷並宜以艾灸之雄按徐靈胎云癰疽陽毒及生頭面者皆不可灸
