front:
  text: 序魏柳洲先生輯續名醫類案六十卷脫稿未久先生尋逝幸已邀録四庫館書不致散佚提要病其編次潦草蓋未經刪定之故也雄不才僭刪蕪復而卷帙猶繁未能付梓爰先録其所附按語為柳洲醫話以示一斑云咸豐元年冬十一月後學王士雄書於潛齊
  hash: sha256:775cec9d5f0ab5099df53659b071bb6477fcb207b47ae319a7eaf59aa551187f
  markers:
